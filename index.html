<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trésor de La Buse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inconsolata:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8; --ink: #1a1410; --rust: #b8451a;
    --gold: #c8a85a; --mist: #8a8075;
  }

  html, body {
    height: 100%; background: var(--ink); color: var(--cream);
    font-family: 'Inconsolata', monospace;
    overflow: hidden; user-select: none;
  }

  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100dvh; position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px; pointer-events: none; z-index: 100; opacity: 0.4;
  }

  /* ── PERMISSION SCREEN ── */
  #permScreen {
    position: fixed; inset: 0; z-index: 50;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
    transition: opacity 0.6s ease;
  }

  #permScreen.hidden { opacity: 0; pointer-events: none; }

  .perm-icon { margin-bottom: 2rem; opacity: 0.85; }

  .perm-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    letter-spacing: 0.12em; line-height: 1.15; margin-bottom: 0.3rem;
  }
  .perm-title em { font-style: italic; color: var(--gold); }

  .perm-elev {
    font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--mist); text-transform: uppercase; margin-bottom: 2.2rem;
  }

  .perm-steps {
    display: flex; flex-direction: column; gap: 1rem;
    width: 100%; max-width: 300px; margin-bottom: 2.4rem;
  }

  .perm-step {
    display: flex; align-items: center; gap: 0.9rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,168,90,0.15);
    border-radius: 4px; padding: 0.8rem 1rem;
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--mist);
    transition: border-color 0.4s, color 0.4s;
  }
  .perm-step.granted { border-color: rgba(200,168,90,0.5); color: var(--gold); }
  .perm-step.denied  { border-color: rgba(184,69,26,0.5);  color: var(--rust); }
  .perm-step svg { flex-shrink: 0; }

  .perm-btn {
    background: none; border: 1px solid var(--gold); color: var(--gold);
    font-family: 'Inconsolata', monospace; font-size: 0.75rem;
    letter-spacing: 0.3em; text-transform: uppercase;
    padding: 0.9rem 2.4rem; cursor: pointer; border-radius: 2px;
    transition: background 0.2s; -webkit-appearance: none;
  }
  .perm-btn:disabled { opacity: 0.4; cursor: default; }
  .perm-btn:not(:disabled):active { background: rgba(200,168,90,0.15); }

  .perm-note {
    margin-top: 1.2rem; font-size: 0.58rem; letter-spacing: 0.15em;
    color: rgba(138,128,117,0.5); max-width: 260px; line-height: 1.7;
  }

  /* ── COMPASS SCREEN ── */
  #appScreen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; opacity: 0; transition: opacity 0.8s ease 0.3s;
  }
  #appScreen.visible { opacity: 1; }

  .title-block { text-align: center; margin-bottom: 2.5rem; }
  .title-block h1 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    letter-spacing: 0.15em; color: var(--cream); line-height: 1.1;
  }
  .title-block h1 em { font-style: italic; color: var(--gold); }
  .title-block .subtitle {
    font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--mist); margin-top: 0.4rem; text-transform: uppercase;
  }

  .compass-wrap {
    position: relative;
    width: min(72vw, 72vh, 340px); height: min(72vw, 72vh, 340px);
  }

  .ring-outer {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(200,168,90,0.35);
    box-shadow: 0 0 40px rgba(200,168,90,0.06), inset 0 0 40px rgba(0,0,0,0.4);
  }

  .degree-marks { position: absolute; inset: 6px; }
  .degree-marks svg { width: 100%; height: 100%; }

  .compass-face {
    position: absolute; inset: 18%; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #2a2218, #0d0b08);
    border: 1px solid rgba(200,168,90,0.2);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 4px 20px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
  }

  .needle-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
  }

  .needle {
    position: relative; width: 4px; height: 70%;
    display: flex; flex-direction: column; align-items: center;
  }

  .needle-north {
    flex: 1; width: 100%;
    background: linear-gradient(to top, var(--rust), #e05520);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    filter: drop-shadow(0 0 6px rgba(184,69,26,0.6));
  }

  .needle-south {
    flex: 1; width: 100%;
    background: linear-gradient(to bottom, var(--mist), #5a5248);
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
  }

  .needle-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 8px rgba(200,168,90,0.5); z-index: 5;
  }

  /* Icône trésor à la pointe de l'aiguille */
  .needle-icon { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); }

  .cardinals { position: absolute; inset: 10%; pointer-events: none; }
  .cardinal {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    font-weight: 300; letter-spacing: 0.1em;
    color: var(--mist); transform: translate(-50%, -50%);
  }
  .cardinal.N { top: 4%;  left: 50%; color: var(--cream); font-weight: 400; }
  .cardinal.S { top: 96%; left: 50%; }
  .cardinal.E { top: 50%; left: 96%; }
  .cardinal.W { top: 50%; left: 4%;  }

  .info-panel { margin-top: 2rem; text-align: center; min-height: 5rem; }

  .bearing-display {
    font-size: clamp(2rem, 8vw, 3rem);
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    color: var(--gold); letter-spacing: 0.05em; line-height: 1;
  }
  .bearing-display span { font-size: 0.5em; color: var(--mist); vertical-align: super; }

  .distance-display {
    font-size: 0.7rem; color: var(--mist);
    letter-spacing: 0.25em; margin-top: 0.4rem; text-transform: uppercase;
  }

  .status-msg {
    font-size: 0.65rem; color: var(--mist);
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 0 1rem; line-height: 1.7;
  }

  .coords-footer {
    position: fixed; bottom: 1.5rem; left: 0; right: 0;
    text-align: center; font-size: 0.58rem;
    letter-spacing: 0.2em; color: rgba(138,128,117,0.5); z-index: 10;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.3); }
  }
  .live-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--rust);
    margin-right: 0.4rem; vertical-align: middle;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 10px; height: 10px;
    border: 1px solid var(--mist); border-top-color: var(--gold);
    border-radius: 50%; margin-right: 0.5rem; vertical-align: middle;
    animation: spin 1s linear infinite;
  }
</style>
</head>
<body>

<!-- ── PERMISSION SCREEN ── -->
<div id="permScreen">
  <!-- Icône coffre au trésor -->
  <svg class="perm-icon" width="64" height="52" viewBox="0 0 64 52" fill="none">
    <rect x="4" y="20" width="56" height="30" rx="3" fill="none" stroke="#c8a85a" stroke-width="1.2"/>
    <path d="M4 20 Q4 8 32 8 Q60 8 60 20" fill="none" stroke="#c8a85a" stroke-width="1.2"/>
    <line x1="4" y1="35" x2="60" y2="35" stroke="#c8a85a" stroke-width="0.8" opacity="0.5"/>
    <rect x="26" y="31" width="12" height="8" rx="2" fill="none" stroke="#c8a85a" stroke-width="1"/>
    <circle cx="32" cy="35" r="1.5" fill="#c8a85a"/>
    <line x1="16" y1="20" x2="16" y2="35" stroke="#c8a85a" stroke-width="0.6" opacity="0.4"/>
    <line x1="48" y1="20" x2="48" y2="35" stroke="#c8a85a" stroke-width="0.6" opacity="0.4"/>
  </svg>

  <div class="perm-title">Trésor de <em>La Buse</em></div>

  <div class="perm-steps">
    <div class="perm-step" id="stepGeo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <circle cx="12" cy="12" r="9" stroke-dasharray="2 2" opacity="0.4"/>
      </svg>
      Localisation GPS
    </div>
    <div class="perm-step" id="stepCompass">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
      </svg>
      Boussole
    </div>
  </div>

  <button class="perm-btn" id="permBtn" onclick="requestPermissions()">Activer</button>

  <div class="perm-note">
    Ces données restent sur votre appareil.<br>Aucune information n'est transmise.
  </div>
</div>

<!-- ── COMPASS SCREEN ── -->
<div id="appScreen">
  <div class="title-block">
    <h1>Trésor de <em>La Buse</em></h1>

  </div>

  <div class="compass-wrap">
    <div class="ring-outer"></div>
    <div class="degree-marks">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g id="ticks"></g>
      </svg>
    </div>
    <div class="cardinals">
      <div class="cardinal N">N</div>
      <div class="cardinal S">S</div>
      <div class="cardinal E">E</div>
      <div class="cardinal W">O</div>
    </div>
    <div class="compass-face">
      <div class="needle-wrap" id="needleWrap">
        <div class="needle">
          <!-- Icône X à la pointe -->
          <svg class="needle-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <line x1="2" y1="2" x2="16" y2="16" stroke="#c8a85a" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="2" x2="2" y2="16" stroke="#c8a85a" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <div class="needle-north"></div>
          <div class="needle-center"></div>
          <div class="needle-south"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="status-msg"><span class="spinner"></span>Acquisition GPS…</div>
  </div>
</div>

<div class="coords-footer" id="coordsFooter">
  Trésor de La Buse — La Réunion
</div>

<script>
const TARGET = { lat: -21.0892, lng: 55.4823 };

let userPos     = null;
let needleAngle = 0;
let targetAngle = 0;

const BUF_SIZE = 15;
const sinBuf = [], cosBuf = [];
let smoothedHeading = null;

function pushHeading(deg) {
  const r = deg * Math.PI / 180;
  sinBuf.push(Math.sin(r)); if (sinBuf.length > BUF_SIZE) sinBuf.shift();
  cosBuf.push(Math.cos(r)); if (cosBuf.length > BUF_SIZE) cosBuf.shift();
  const s = sinBuf.reduce((a,b) => a+b, 0) / sinBuf.length;
  const c = cosBuf.reduce((a,b) => a+b, 0) / cosBuf.length;
  smoothedHeading = (Math.atan2(s, c) * 180 / Math.PI + 360) % 360;
}

(function() {
  const g = document.getElementById('ticks');
  const cx = 100, cy = 100, r = 96;
  for (let i = 0; i < 360; i += 5) {
    const rad = (i - 90) * Math.PI / 180;
    const isMajor = i % 45 === 0;
    const len = isMajor ? 10 : (i % 15 === 0 ? 6 : 3);
    const x1 = cx + r * Math.cos(rad), y1 = cy + r * Math.sin(rad);
    const x2 = cx + (r-len) * Math.cos(rad), y2 = cy + (r-len) * Math.sin(rad);
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', isMajor ? 'rgba(200,168,90,0.5)' : 'rgba(200,168,90,0.2)');
    l.setAttribute('stroke-width', isMajor ? '1.5' : '0.8');
    g.appendChild(l);
  }
})();

function bearingTo(from, to) {
  const r = d => d * Math.PI / 180;
  const dL = r(to.lng - from.lng);
  const y = Math.sin(dL) * Math.cos(r(to.lat));
  const x = Math.cos(r(from.lat)) * Math.sin(r(to.lat)) - Math.sin(r(from.lat)) * Math.cos(r(to.lat)) * Math.cos(dL);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function haversineKm(from, to) {
  const R = 6371, r = d => d * Math.PI / 180;
  const dLat = r(to.lat - from.lat), dLng = r(to.lng - from.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(r(from.lat)) * Math.cos(r(to.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  return km < 1 ? `${Math.round(km*1000)} m` : `${Math.round(km)} km`;
}

function animateNeedle() {
  let delta = ((targetAngle - needleAngle) % 360 + 540) % 360 - 180;
  needleAngle += delta * 0.1;
  document.getElementById('needleWrap').style.transform = `rotate(${needleAngle}deg)`;
  requestAnimationFrame(animateNeedle);
}

function computeTarget() {
  if (!userPos) return;
  const bearing = bearingTo(userPos, TARGET);
  const dist    = haversineKm(userPos, TARGET);
  targetAngle   = smoothedHeading !== null ? bearing - smoothedHeading : bearing;

  document.getElementById('infoPanel').innerHTML = `
    <div class="bearing-display">${Math.round(bearing)}<span>°</span></div>
    <div class="distance-display"><span class="live-dot"></span>${formatDist(dist)} du trésor</div>
  `;
  document.getElementById('coordsFooter').textContent =
    `Vous : ${userPos.lat.toFixed(4)}°, ${userPos.lng.toFixed(4)}°`;
}

function onOrientation(e) {
  let raw = null;
  if (typeof e.webkitCompassHeading === 'number') {
    raw = e.webkitCompassHeading;
  } else if (typeof e.alpha === 'number') {
    raw = (360 - e.alpha) % 360;
  }
  if (raw === null) return;
  pushHeading(raw);
  computeTarget();
}

function setStep(id, state) {
  const el = document.getElementById(id);
  el.classList.remove('granted','denied');
  if (state) el.classList.add(state);
}

function launchApp() {
  document.getElementById('permScreen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('permScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('visible');
    animateNeedle();
  }, 700);
}

function startGeo() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { setStep('stepGeo','denied'); resolve(false); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setStep('stepGeo','granted');
        navigator.geolocation.watchPosition(
          p => { userPos = { lat: p.coords.latitude, lng: p.coords.longitude }; computeTarget(); },
          () => {},
          { enableHighAccuracy: true, maximumAge: 3000 }
        );
        resolve(true);
      },
      () => { setStep('stepGeo','denied'); resolve(false); },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  });
}

function startCompass() {
  window.addEventListener('deviceorientationabsolute', onOrientation, true);
  window.addEventListener('deviceorientation', onOrientation, true);
  setStep('stepCompass','granted');
  return Promise.resolve(true);
}

async function requestCompassPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r !== 'granted') { setStep('stepCompass','denied'); return false; }
    } catch { setStep('stepCompass','denied'); return false; }
  }
  return true;
}

async function requestPermissions() {
  const btn = document.getElementById('permBtn');
  btn.disabled = true; btn.textContent = '…';

  const compassOk = await requestCompassPermission();
  if (compassOk) startCompass();

  const geoOk = await startGeo();

  await new Promise(r => setTimeout(r, 500));

  if (!geoOk) {
    document.getElementById('infoPanel').innerHTML =
      `<div class="status-msg" style="color:var(--rust)">GPS refusé — activez la localisation dans les réglages</div>`;
  }

  launchApp();
  if (userPos) computeTarget();
}
</script>
</body>
</html>
